<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RunTube</title>
  <style>
    /* ── Reset & tokens ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c14;
      --surface:   #0e1420;
      --surface2:  #141b2e;
      --border:    rgba(255,255,255,.07);
      --text:      #e8ecf8;
      --muted:     #6b7394;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --green:     #34d399;
      --red:       #f87171;
      --yellow:    #fbbf24;
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow:    0 8px 40px rgba(0,0,0,.6);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      line-height: 1.5;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(8,12,20,.9);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 200;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: -.5px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .3s, box-shadow .3s;
      flex-shrink: 0;
    }
    .dot.ok   { background: var(--green);  box-shadow: 0 0 8px var(--green); }
    .dot.warn { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
    .dot.err  { background: var(--red);    box-shadow: 0 0 8px var(--red); }

    #connLabel {
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
    }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 20px 24px 28px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Player ── */
    .player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #000;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    #yt-player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Patrol lamp overlay ── */
    @keyframes patrol-flash {
      0%   { background: rgba(220, 30,  30, .55); box-shadow: inset 0 0 80px rgba(255,0,0,.4); }
      25%  { background: rgba(30,  80, 220, .55); box-shadow: inset 0 0 80px rgba(30,80,255,.4); }
      50%  { background: rgba(220, 30,  30, .55); box-shadow: inset 0 0 80px rgba(255,0,0,.4); }
      75%  { background: rgba(30,  80, 220, .55); box-shadow: inset 0 0 80px rgba(30,80,255,.4); }
      100% { background: rgba(220, 30,  30, .55); box-shadow: inset 0 0 80px rgba(255,0,0,.4); }
    }

    @keyframes siren-text {
      0%, 49%  { color: #ff4444; text-shadow: 0 0 30px #ff0000, 0 0 60px #ff0000; }
      50%, 100% { color: #4488ff; text-shadow: 0 0 30px #0044ff, 0 0 60px #0044ff; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-4px); }
      40%       { transform: translateX(4px); }
      60%       { transform: translateX(-3px); }
      80%       { transform: translateX(3px); }
    }

    /* ── Overlay ── */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(8,12,20,.82);
      backdrop-filter: blur(6px);
      transition: opacity .25s;
      z-index: 10;
    }

    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay.patrol {
      animation: patrol-flash .5s step-start infinite;
      backdrop-filter: blur(4px);
    }

    .overlay-icon { font-size: 3.5rem; line-height: 1; }

    .overlay-title {
      font-size: 1.6rem;
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
    }

    .overlay.patrol .overlay-title {
      animation: siren-text .5s step-start infinite, shake .4s ease-in-out infinite;
    }

    .overlay-sub {
      font-size: .9rem;
      color: var(--muted);
      text-align: center;
      max-width: 320px;
    }

    .overlay.patrol .overlay-sub { color: rgba(255,255,255,.7); }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 3px;
      transition: border-color .3s;
    }

    .stat-card.active { border-color: rgba(108,99,255,.5); }

    .stat-label {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: var(--text);
      transition: color .3s;
    }

    .stat-unit {
      font-size: .72rem;
      color: var(--muted);
      margin-top: 1px;
    }

    @keyframes pulse-green {
      0%, 100% { text-shadow: none; }
      50%       { text-shadow: 0 0 20px rgba(52,211,153,.7); }
    }

    .stat-value.riding { color: var(--green); animation: pulse-green 2s ease-in-out infinite; }

    /* ── Controls row ── */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ctrl-label {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Threshold preset buttons */
    .threshold-btns {
      display: flex;
      gap: 6px;
    }

    .btn-threshold {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      border-radius: var(--radius-md);
      font: inherit;
      font-size: .85rem;
      font-weight: 700;
      padding: 8px 16px;
      cursor: pointer;
      transition: all .15s;
    }

    .btn-threshold:hover { border-color: var(--accent); color: var(--text); }

    .btn-threshold.selected {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 3px 14px rgba(108,99,255,.4);
    }

    /* Ride status badge */
    .ride-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 700;
      border: 1px solid transparent;
      white-space: nowrap;
      transition: all .3s;
      margin-left: auto;
    }

    .ride-badge.riding       { background: rgba(52,211,153,.12); border-color: rgba(52,211,153,.3);  color: var(--green); }
    .ride-badge.stopped      { background: rgba(248,113,113,.12); border-color: rgba(248,113,113,.3); color: var(--red); }
    .ride-badge.disconnected { background: rgba(107,115,148,.1);  border-color: rgba(107,115,148,.2); color: var(--muted); }

    /* ── BT buttons ── */
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      border-radius: var(--radius-md);
      font: inherit;
      font-weight: 700;
      font-size: .875rem;
      padding: 11px 18px;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: filter .15s, transform .1s, opacity .2s;
    }

    button:hover:not(:disabled)  { filter: brightness(1.15); }
    button:active:not(:disabled) { transform: scale(.97); }
    button:disabled               { opacity: .4; cursor: not-allowed; }

    .btn-primary   { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; box-shadow: 0 4px 20px rgba(108,99,255,.35); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger    { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.25); }

    .btn-last {
      background: linear-gradient(135deg, #0f4c2a, #1a6b3a);
      color: var(--green);
      border: 1px solid rgba(52,211,153,.3);
      box-shadow: 0 4px 16px rgba(52,211,153,.2);
    }

    .btn-last .last-name {
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hint {
      font-size: .75rem;
      color: var(--muted);
      text-align: center;
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      main   { padding: 14px 14px 24px; gap: 12px; }
      header { padding: 12px 16px; }
      .stat-value { font-size: 1.5rem; }
      .controls-row { gap: 8px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="14" fill="url(#lg)"/>
        <path d="M11 9.5l8 4.5-8 4.5V9.5z" fill="#fff"/>
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#6c63ff"/>
            <stop offset="100%" stop-color="#a78bfa"/>
          </linearGradient>
        </defs>
      </svg>
      RunTube
    </div>
    <div class="header-right">
      <div class="dot" id="connDot"></div>
      <span id="connLabel">未接続</span>
    </div>
  </header>

  <!-- Main -->
  <main>

    <!-- Player -->
    <div class="player-wrap">
      <div id="yt-player"></div>
      <div class="overlay" id="overlay">
        <div class="overlay-icon" id="overlayIcon">🚴</div>
        <div class="overlay-title" id="overlayTitle">Bluetooth で接続してください</div>
        <div class="overlay-sub" id="overlaySub">バイクの電源を入れて「バイク接続」ボタンを押してください</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card" id="cardSpeed">
        <div class="stat-label">Speed</div>
        <div class="stat-value" id="speedVal">—</div>
        <div class="stat-unit">km/h</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Cadence</div>
        <div class="stat-value" id="cadenceVal">—</div>
        <div class="stat-unit">rpm</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Power</div>
        <div class="stat-value" id="powerVal">—</div>
        <div class="stat-unit">W</div>
      </div>
    </div>

    <!-- Threshold + status -->
    <div class="controls-row">
      <span class="ctrl-label">再生閾値</span>
      <div class="threshold-btns">
        <button class="btn-threshold" data-kmh="30">30 km/h</button>
        <button class="btn-threshold" data-kmh="40">40 km/h</button>
        <button class="btn-threshold" data-kmh="50">50 km/h</button>
      </div>
      <div class="ride-badge disconnected" id="rideBadge">
        <span id="rideBadgeIcon">—</span>
        <span id="rideBadgeText">未接続</span>
      </div>
    </div>

    <!-- BT Buttons -->
    <div class="btn-row">
      <button class="btn-last" id="connectLastBtn" style="display:none">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        <span class="last-name" id="connectLastName">前回のデバイス</span>
        に接続
      </button>
      <button class="btn-primary" id="connectNamedBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
        バイク接続
      </button>
      <button class="btn-secondary" id="connectAnyBtn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        すべてのデバイス
      </button>
      <button class="btn-danger" id="disconnectBtn" disabled>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18.36 6.64A9 9 0 1 1 5.64 19.36"/><line x1="12" y1="2" x2="12" y2="12"/></svg>
        切断
      </button>
    </div>

    <p class="hint">Chrome / Edge 系ブラウザ + HTTPS 環境が必要です（iOS Safari は非対応）</p>
  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    /* ── Constants ── */
    const PLAYLIST_ID = 'PL1s89zMwwA_0KHFlD_PL5qVDptDaaC9Yh'
    const FIRST_VIDEO = 'kXpOEzNZ8hQ'
    const HYST        = 1.0   // hysteresis ±1 km/h

    const SVC = {
      fitnessMachine:      0x1826,
      cyclingSpeedCadence: 0x1816,
      cyclingPower:        0x1818,
    }
    const CHAR = {
      indoorBikeData:          0x2AD2,
      fitnessMachineStatus:    0x2ADA,
      cyclingPowerMeasurement: 0x2A63,
      cscMeasurement:          0x2A5B,
    }

    /* ── localStorage ── */
    const LS_KEY = 'runtube_last_device'

    function saveLastDevice(name, namePrefix) {
      try { localStorage.setItem(LS_KEY, JSON.stringify({ name, namePrefix })) } catch (_) {}
    }

    function loadLastDevice() {
      try { return JSON.parse(localStorage.getItem(LS_KEY)) } catch (_) { return null }
    }

    /* ── State ── */
    let device       = null
    let server       = null
    let lastCsc      = null
    let ytReady      = false
    let player       = null
    let isRiding     = false
    let btConnected  = false
    let currentSpeed = null
    let thresholdKmh = 30          // default 30 km/h
    let patrolTimer  = null

    /* ── DOM ── */
    const speedVal      = document.getElementById('speedVal')
    const cadenceVal    = document.getElementById('cadenceVal')
    const powerVal      = document.getElementById('powerVal')
    const rideBadge     = document.getElementById('rideBadge')
    const rideBadgeIcon = document.getElementById('rideBadgeIcon')
    const rideBadgeText = document.getElementById('rideBadgeText')
    const overlay       = document.getElementById('overlay')
    const overlayIcon   = document.getElementById('overlayIcon')
    const overlayTitle  = document.getElementById('overlayTitle')
    const overlaySub    = document.getElementById('overlaySub')
    const connDot       = document.getElementById('connDot')
    const connLabel     = document.getElementById('connLabel')
    const disconnectBtn    = document.getElementById('disconnectBtn')
    const cardSpeed        = document.getElementById('cardSpeed')
    const threshBtns       = document.querySelectorAll('.btn-threshold')
    const connectLastBtn   = document.getElementById('connectLastBtn')
    const connectLastName  = document.getElementById('connectLastName')

    /* ── Threshold preset buttons ── */
    threshBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        thresholdKmh = Number(btn.dataset.kmh)
        threshBtns.forEach(b => b.classList.toggle('selected', b === btn))
        if (btConnected && currentSpeed !== null) evaluateSpeed(currentSpeed)
      })
    })
    // select default (30)
    threshBtns.forEach(b => b.classList.toggle('selected', Number(b.dataset.kmh) === thresholdKmh))

    /* ── YouTube IFrame API ── */
    function onYouTubeIframeAPIReady() {
      ytReady = true
      player = new YT.Player('yt-player', {
        videoId: FIRST_VIDEO,
        playerVars: {
          autoplay:       0,
          controls:       0,
          disablekb:      1,
          listType:       'playlist',
          list:           PLAYLIST_ID,
          rel:            0,
          modestbranding: 1,
          fs:             0,
        },
        events: { onReady: () => {} },
      })
    }

    /* ── Speed evaluation ── */
    function evaluateSpeed(kmh) {
      if (!btConnected) return
      if (!isRiding && kmh >= thresholdKmh + HYST) {
        isRiding = true
        stopPatrol()
        setRidingUI(true)
        tryPlay()
      } else if (isRiding && kmh < thresholdKmh - HYST) {
        isRiding = false
        setRidingUI(false)
        tryPause()
        startPatrol()
      }
    }

    function tryPlay()  { if (ytReady && player?.playVideo)  player.playVideo() }
    function tryPause() { if (ytReady && player?.pauseVideo) player.pauseVideo() }

    /* ── Patrol lamp ── */
    function startPatrol() {
      stopPatrol()
      overlay.classList.add('patrol')
      overlayIcon.textContent  = '🚨'
      overlayTitle.textContent = 'STOP! もっと速く！'
      overlaySub.textContent   = `${thresholdKmh} km/h 以上で動画が再生されます`
      overlay.classList.remove('hidden')
      // Auto-stop patrol after 5 s to avoid seizure risk; overlay stays
      patrolTimer = setTimeout(() => {
        overlay.classList.remove('patrol')
        overlayIcon.textContent  = '🚴'
        overlayTitle.textContent = 'ペダルを漕いでください'
        overlaySub.textContent   = `${thresholdKmh} km/h 以上で動画が再生されます`
      }, 5000)
    }

    function stopPatrol() {
      if (patrolTimer) { clearTimeout(patrolTimer); patrolTimer = null }
      overlay.classList.remove('patrol')
    }

    /* ── Riding UI ── */
    function setRidingUI(riding) {
      if (riding) {
        stopPatrol()
        setOverlay(false)
        rideBadge.className     = 'ride-badge riding'
        rideBadgeIcon.textContent = '🟢'
        rideBadgeText.textContent = '走行中'
        speedVal.classList.add('riding')
        cardSpeed.classList.add('active')
      } else {
        // patrol will set overlay
        rideBadge.className     = 'ride-badge stopped'
        rideBadgeIcon.textContent = '🔴'
        rideBadgeText.textContent = '停止中'
        speedVal.classList.remove('riding')
        cardSpeed.classList.remove('active')
      }
    }

    function setOverlay(visible, icon = '', title = '', sub = '') {
      stopPatrol()
      if (visible) {
        overlayIcon.textContent  = icon
        overlayTitle.textContent = title
        overlaySub.textContent   = sub
        overlay.classList.remove('hidden')
      } else {
        overlay.classList.add('hidden')
      }
    }

    function setConnState(connected, label = '') {
      btConnected = connected
      connLabel.textContent = label
      if (connected) {
        connDot.className      = 'dot ok'
        disconnectBtn.disabled = false
      } else {
        connDot.className      = 'dot'
        disconnectBtn.disabled = true
        isRiding     = false
        currentSpeed = null
        stopPatrol()
        speedVal.textContent    = '—'
        speedVal.classList.remove('riding')
        cadenceVal.textContent  = '—'
        powerVal.textContent    = '—'
        cardSpeed.classList.remove('active')
        rideBadge.className       = 'ride-badge disconnected'
        rideBadgeIcon.textContent = '—'
        rideBadgeText.textContent = '未接続'
        tryPause()
      }
    }

    /* ── Bluetooth ── */
    async function connect(acceptAll, lastDeviceNamePrefix = null) {
      if (!navigator.bluetooth) {
        alert('このブラウザは Web Bluetooth に対応していません。\nChrome / Edge 系ブラウザでお試しください。')
        return
      }
      connDot.className     = 'dot warn'
      connLabel.textContent = '接続中...'

      try {
        let options
        if (lastDeviceNamePrefix) {
          // 前回デバイス：名前プレフィックスで絞り込んでダイアログを開く
          options = {
            filters: [{ namePrefix: lastDeviceNamePrefix }],
            optionalServices: Object.values(SVC),
          }
        } else if (acceptAll) {
          options = { acceptAllDevices: true, optionalServices: Object.values(SVC) }
        } else {
          options = {
            filters: [
              { namePrefix: 'QB' },
              { namePrefix: 'NEXGIM' },
              { namePrefix: 'C01' },
            ],
            optionalServices: Object.values(SVC),
          }
        }

        device = await navigator.bluetooth.requestDevice(options)
        device.addEventListener('gattserverdisconnected', onDisconnected)
        server = await device.gatt.connect()

        // 接続成功したらデバイス名を保存
        const devName = device.name || ''
        const prefix  = devName.slice(0, 3) || devName  // 先頭3文字をプレフィックスとして保存
        saveLastDevice(devName, prefix)
        updateLastDeviceBtn()

        setConnState(true, devName || 'バイク接続済み')
        setOverlay(true, '🚴', 'ペダルを漕いでください', `${thresholdKmh} km/h 以上で動画が再生されます`)
        rideBadge.className       = 'ride-badge stopped'
        rideBadgeIcon.textContent = '🔴'
        rideBadgeText.textContent = '停止中'

        await subscribeCharacteristics()
      } catch (err) {
        connDot.className     = 'dot err'
        connLabel.textContent = '接続失敗'
        console.error(err)
      }
    }

    function updateLastDeviceBtn() {
      const last = loadLastDevice()
      if (last?.name) {
        connectLastName.textContent = last.name
        connectLastBtn.style.display = 'flex'
      } else {
        connectLastBtn.style.display = 'none'
      }
    }

    async function subscribeCharacteristics() {
      const targets = [
        { svc: SVC.fitnessMachine,      char: CHAR.indoorBikeData,          handler: parseIndoorBikeData },
        { svc: SVC.fitnessMachine,      char: CHAR.fitnessMachineStatus,    handler: null },
        { svc: SVC.cyclingPower,        char: CHAR.cyclingPowerMeasurement, handler: parseCyclingPower },
        { svc: SVC.cyclingSpeedCadence, char: CHAR.cscMeasurement,          handler: parseCscMeasurement },
      ]
      for (const t of targets) {
        try {
          const svc = await server.getPrimaryService(t.svc)
          const ch  = await svc.getCharacteristic(t.char)
          if ((ch.properties.notify || ch.properties.indicate) && t.handler) {
            await ch.startNotifications()
            ch.addEventListener('characteristicvaluechanged', e => t.handler(e.target.value))
          }
        } catch (_) {}
      }
    }

    /* ── Parsers ── */
    function parseIndoorBikeData(dv) {
      try {
        const flags = dv.getUint16(0, true)
        let off = 2
        const speedKmh = dv.getUint16(off, true) / 100; off += 2
        if (flags & (1 << 1)) off += 2
        let cad = null
        if (flags & (1 << 2)) { cad = dv.getUint16(off, true) / 2; off += 2 }
        if (flags & (1 << 3)) off += 2
        if (flags & (1 << 4)) off += 3
        if (flags & (1 << 5)) off += 2
        let pwr = null
        if (flags & (1 << 6)) pwr = dv.getInt16(off, true)

        currentSpeed = speedKmh
        speedVal.textContent = speedKmh.toFixed(1)
        if (cad !== null) cadenceVal.textContent = cad.toFixed(0)
        if (pwr !== null) powerVal.textContent   = pwr
        evaluateSpeed(speedKmh)
      } catch (_) {}
    }

    function parseCyclingPower(dv) {
      try { powerVal.textContent = dv.getInt16(2, true) } catch (_) {}
    }

    function parseCscMeasurement(dv) {
      try {
        const flags = dv.getUint8(0)
        let off = 1
        if (flags & 0x01) off += 6
        if (flags & 0x02) {
          const revs = dv.getUint16(off, true); off += 2
          const time = dv.getUint16(off, true)
          if (lastCsc) {
            const revDiff  = (revs - lastCsc.revs) & 0xFFFF
            const timeDiff = (time - lastCsc.time) & 0xFFFF
            if (timeDiff > 0) cadenceVal.textContent = ((revDiff / (timeDiff / 1024)) * 60).toFixed(0)
          }
          lastCsc = { revs, time }
        }
      } catch (_) {}
    }

    /* ── Disconnect ── */
    async function disconnect() {
      try { if (device?.gatt?.connected) device.gatt.disconnect() } catch (_) {}
      onDisconnected()
    }

    function onDisconnected() {
      setConnState(false)
      setOverlay(true, '🚴', 'Bluetooth で接続してください', 'バイクの電源を入れて「バイク接続」ボタンを押してください')
      lastCsc = null
      server  = null
    }

    /* ── Wiring ── */
    document.getElementById('connectNamedBtn').addEventListener('click', () => connect(false))
    document.getElementById('connectAnyBtn').addEventListener('click',   () => connect(true))
    document.getElementById('disconnectBtn').addEventListener('click',   () => disconnect())
    connectLastBtn.addEventListener('click', () => {
      const last = loadLastDevice()
      if (last?.namePrefix) connect(false, last.namePrefix)
    })

    /* ── Init ── */
    setConnState(false)
    setOverlay(true, '🚴', 'Bluetooth で接続してください', 'バイクの電源を入れて「バイク接続」ボタンを押してください')
    updateLastDeviceBtn()
  </script>

</body>
</html>
