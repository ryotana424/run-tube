<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RunTube</title>
  <style>
    /* ── Reset & tokens ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c14;
      --surface:   #0e1420;
      --surface2:  #141b2e;
      --border:    rgba(255,255,255,.07);
      --text:      #e8ecf8;
      --muted:     #6b7394;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --green:     #34d399;
      --red:       #f87171;
      --yellow:    #fbbf24;
      --radius-lg: 20px;
      --radius-md: 12px;
      --shadow:    0 8px 40px rgba(0,0,0,.6);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      line-height: 1.5;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Logo (in sidebar) ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: .95rem;
      font-weight: 800;
      letter-spacing: -.5px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background .3s, box-shadow .3s;
      flex-shrink: 0;
    }
    .dot.ok   { background: var(--green);  box-shadow: 0 0 8px var(--green); }
    .dot.warn { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
    .dot.err  { background: var(--red);    box-shadow: 0 0 8px var(--red); }

    #connLabel {
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
    }

    /* ── Main ── */
    main {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px 16px;
      width: 100%;
      overflow: hidden;
    }

    /* ── Player ── */
    .player-wrap {
      position: relative;
      width: 100%;
      flex: 1;
      min-height: 0;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: #000;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }


    #yt-player {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* ── Iris transition on player-wrap ── */
    @keyframes iris-out {
      from { clip-path: circle(71% at 50% 50%); }
      to   { clip-path: circle(0%  at 50% 50%); }
    }
    @keyframes iris-in {
      from { clip-path: circle(0%  at 50% 50%); }
      to   { clip-path: circle(71% at 50% 50%); }
    }

    .player-wrap.iris-out {
      animation: iris-out 1.8s cubic-bezier(.4,0,.6,1) forwards;
    }
    .player-wrap.iris-in {
      animation: iris-in  .6s cubic-bezier(.2,0,.4,1) forwards;
    }

    /* ── Overlay ── */
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(8,12,20,.82);
      backdrop-filter: blur(6px);
      transition: opacity .25s;
      z-index: 10;
    }

    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-icon { font-size: 3.5rem; line-height: 1; }

    .overlay-title {
      font-size: 1.6rem;
      font-weight: 900;
      text-align: center;
      line-height: 1.2;
    }

    .overlay-sub {
      font-size: .9rem;
      color: var(--muted);
      text-align: center;
      max-width: 320px;
    }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      transition: border-color .3s;
    }

    .stat-card.active { border-color: rgba(108,99,255,.5); }

    .stat-label {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      color: var(--text);
      transition: color .3s;
    }

    .stat-unit {
      font-size: .72rem;
      color: var(--muted);
      margin-top: 1px;
    }

    @keyframes pulse-green {
      0%, 100% { text-shadow: none; }
      50%       { text-shadow: 0 0 20px rgba(52,211,153,.7); }
    }

    .stat-value.riding { color: var(--green); animation: pulse-green 2s ease-in-out infinite; }

    /* ── Controls row ── */
    .controls-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ctrl-label {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Threshold preset buttons */
    .threshold-btns {
      display: flex;
      gap: 6px;
    }

    .btn-threshold {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      border-radius: var(--radius-md);
      font: inherit;
      font-size: .85rem;
      font-weight: 700;
      padding: 8px 16px;
      cursor: pointer;
      transition: all .15s;
    }

    .btn-threshold:hover { border-color: var(--accent); color: var(--text); }

    .btn-threshold.selected {
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 3px 14px rgba(108,99,255,.4);
    }

    /* Ride status badge */
    .ride-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 700;
      border: 1px solid transparent;
      white-space: nowrap;
      transition: all .3s;
      margin-left: auto;
    }

    .ride-badge.riding       { background: rgba(52,211,153,.12); border-color: rgba(52,211,153,.3);  color: var(--green); }
    .ride-badge.stopped      { background: rgba(248,113,113,.12); border-color: rgba(248,113,113,.3); color: var(--red); }
    .ride-badge.disconnected { background: rgba(107,115,148,.1);  border-color: rgba(107,115,148,.2); color: var(--muted); }

    /* ── BT buttons ── */
    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      border-radius: var(--radius-md);
      font: inherit;
      font-weight: 700;
      font-size: .875rem;
      padding: 11px 18px;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: filter .15s, transform .1s, opacity .2s;
    }

    button:hover:not(:disabled)  { filter: brightness(1.15); }
    button:active:not(:disabled) { transform: scale(.97); }
    button:disabled               { opacity: .4; cursor: not-allowed; }

    .btn-primary   { background: linear-gradient(135deg, var(--accent), #8b5cf6); color: #fff; box-shadow: 0 4px 20px rgba(108,99,255,.35); }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-danger    { background: rgba(248,113,113,.15); color: var(--red); border: 1px solid rgba(248,113,113,.25); }

    .btn-last {
      background: linear-gradient(135deg, #0f4c2a, #1a6b3a);
      color: var(--green);
      border: 1px solid rgba(52,211,153,.3);
      box-shadow: 0 4px 16px rgba(52,211,153,.2);
    }

    .btn-last .last-name {
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .hint {
      font-size: .75rem;
      color: var(--muted);
      text-align: center;
    }

    /* ── Sidebar (hidden on mobile) ── */
    .sidebar { display: none; }
    .sidebar .stats-grid { grid-template-columns: 1fr; }

    /* ── Mobile controls ── */
    .mobile-controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Tablet+: side-by-side layout ── */
    @media (min-width: 768px) {
      main {
        flex-direction: row;
        align-items: stretch;
        gap: 14px;
      }
      .player-wrap {
        flex: 1;
        width: auto;
        min-height: 0;
      }
      .sidebar {
        width: 180px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
        overflow-x: hidden;
      }
      .sidebar .stat-card { padding: 7px 10px; }
      .sidebar .stat-value { font-size: 1.3rem; }
      .sidebar button { padding: 8px 10px; font-size: .8rem; }
      .sidebar .btn-threshold { padding: 6px 8px; font-size: .78rem; }
      .mobile-controls { display: none; }
    }

    @media (max-width: 600px) {
      main   { padding: 10px 12px 12px; gap: 8px; }
      header { padding: 10px 14px; }
      .stat-value { font-size: 1.3rem; }
      .controls-row { gap: 6px; }
      .btn-threshold { padding: 6px 12px; font-size: .8rem; }
      button { padding: 9px 14px; font-size: .82rem; }
    }
  </style>
</head>
<body>

  <!-- Main -->
  <main>

    <!-- Player -->
    <div class="player-wrap">
      <div id="yt-player"></div>
      <div class="overlay" id="overlay">
        <div class="overlay-icon" id="overlayIcon">🚴</div>
        <div class="overlay-title" id="overlayTitle">Bluetooth で接続してください</div>

    <!-- Mobile controls (below player, hidden on tablet+) -->
    <div class="mobile-controls">
      <div class="stats-grid">

    </div>

    <!-- Sidebar (right, shown on tablet+) -->
    <aside class="sidebar">

          <path d="M11 9.5l8 4.5-8 4.5V9.5z" fill="#fff"/>

            <linearGradient id="lg2" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#6c63ff"/>
              <stop offset="100%" stop-color="#a78bfa"/>

        RunTube

        </div>

      <!-- BT Buttons -->
      <div class="btn-row" style="flex-direction:column">
        <button class="btn-last js-connect-last" style="display:none;width:100%;justify-content:center">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          <span class="last-name js-last-name">前回のデバイス</span>に接続
        </button>
        <button class="btn-primary js-connect-named" style="width:100%;justify-content:center">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2a7 7 0 0 1 7 7c0 5-7 13-7 13S5 14 5 9a7 7 0 0 1 7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
          バイク接続

          すべてのデバイス

        <button class="btn-danger js-disconnect" disabled style="width:100%;justify-content:center">

    </aside>

  </main>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    /* ── Constants ── */
    const PLAYLIST_ID = 'PL1s89zMwwA_0KHFlD_PL5qVDptDaaC9Yh'
    const FIRST_VIDEO = 'kXpOEzNZ8hQ'
    const HYST        = 1.0   // hysteresis ±1 km/h

    const SVC = {
      fitnessMachine:      0x1826,
      cyclingSpeedCadence: 0x1816,
      cyclingPower:        0x1818,
    }
    const CHAR = {
      indoorBikeData:          0x2AD2,
      fitnessMachineStatus:    0x2ADA,
      cyclingPowerMeasurement: 0x2A63,
      cscMeasurement:          0x2A5B,
    }

    /* ── localStorage ── */
    const LS_KEY = 'runtube_last_device'

    function saveLastDevice(name, namePrefix) {
      try { localStorage.setItem(LS_KEY, JSON.stringify({ name, namePrefix })) } catch (_) {}
    }

    function loadLastDevice() {
      try { return JSON.parse(localStorage.getItem(LS_KEY)) } catch (_) { return null }
    }

    /* ── State ── */
    let device       = null
    let server       = null
    let lastCsc      = null
    let ytReady      = false
    let player       = null
    let isRiding     = false
    let btConnected  = false
    let currentSpeed = null
    let thresholdKmh = 30          // default 30 km/h
    let patrolTimer  = null

    /* ── DOM helpers (supports duplicate elements in mobile/sidebar) ── */
    const $all = s => [...document.querySelectorAll(s)]
    const $     = s => document.querySelector(s)

    const overlay      = document.getElementById('overlay')
    const overlayIcon  = document.getElementById('overlayIcon')
    const overlayTitle = document.getElementById('overlayTitle')
    const overlaySub   = document.getElementById('overlaySub')
    const connDot      = document.getElementById('connDot')
    const connLabel    = document.getElementById('connLabel')
    const playerWrap   = $('.player-wrap')

    // Multi-instance elements (mobile + sidebar)
    const speedVals      = $all('.js-speed')
    const cadenceVals    = $all('.js-cadence')
    const powerVals      = $all('.js-power')
    const rideBadges     = $all('.js-ride-badge')
    const rideBadgeIcons = $all('.js-ride-badge-icon')
    const rideBadgeTexts = $all('.js-ride-badge-text')
    const cardSpeeds     = $all('.js-card-speed')
    const disconnectBtns = $all('.js-disconnect')
    const connectLastBtns= $all('.js-connect-last')
    const lastNames      = $all('.js-last-name')
    const threshBtns     = $all('.btn-threshold')

    /* ── Threshold preset buttons ── */
    threshBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        thresholdKmh = Number(btn.dataset.kmh)
        threshBtns.forEach(b => b.classList.toggle('selected', b === btn))
        if (btConnected && currentSpeed !== null) evaluateSpeed(currentSpeed)
      })
    })
    // select default (30)
    threshBtns.forEach(b => b.classList.toggle('selected', Number(b.dataset.kmh) === thresholdKmh))

    /* ── YouTube IFrame API ── */
    function onYouTubeIframeAPIReady() {
      ytReady = true
      player = new YT.Player('yt-player', {
        videoId: FIRST_VIDEO,
        playerVars: {
          autoplay:       0,
          controls:       0,
          disablekb:      1,
          listType:       'playlist',
          list:           PLAYLIST_ID,
          rel:            0,
          modestbranding: 1,
          fs:             0,
        },
        events: { onReady: onPlayerReady },
      })
    }

    function onPlayerReady() {
      // Autoplay policy unlock: mute → play → pause → unmute
      // This primes the player with a user-gesture context established at connect time.
      player.mute()
      player.playVideo()
      setTimeout(() => {
        player.pauseVideo()
        player.unMute()
      }, 500)
    }

    /* ── Speed evaluation ── */
    function evaluateSpeed(kmh) {
      if (!btConnected) return
      if (!isRiding && kmh >= thresholdKmh + HYST) {
        isRiding = true
        stopPatrol()
        setRidingUI(true)
        tryPlay()
      } else if (isRiding && kmh < thresholdKmh - HYST) {
        isRiding = false
        setRidingUI(false)
        tryPause()
        startPatrol()
      }
    }

    function tryPlay() {
      if (!ytReady || !player?.playVideo) return
      player.unMute()
      player.playVideo()
    }
    function tryPause() {
      if (!ytReady || !player?.pauseVideo) return
      player.pauseVideo()
    }

    /* ── Iris / Patrol ── */
    function startPatrol() {
      stopPatrol()
      // アイリスアウト：動画を円形に縮小
      playerWrap.classList.remove('iris-in')
      playerWrap.classList.add('iris-out')
      overlayIcon.textContent  = '🚴'
      overlayTitle.textContent = 'ペダルを漕いでください'
      overlaySub.textContent   = `${thresholdKmh} km/h 以上で動画が再生されます`
      overlay.classList.remove('hidden')
    }

    function stopPatrol() {
      if (patrolTimer) { clearTimeout(patrolTimer); patrolTimer = null }
      // アイリスイン：動画を円形に拡大復帰
      playerWrap.classList.remove('iris-out')
      playerWrap.classList.add('iris-in')
      playerWrap.addEventListener('animationend', () => {
        playerWrap.classList.remove('iris-in')
      }, { once: true })
    }

    function resetIris() {
      if (patrolTimer) { clearTimeout(patrolTimer); patrolTimer = null }
      playerWrap.classList.remove('iris-out', 'iris-in')
      playerWrap.style.clipPath = ''
    }

    /* ── Riding UI ── */
    function setRidingUI(riding) {
      if (riding) {
        stopPatrol()
        setOverlay(false)
        rideBadges.forEach(el => el.className = 'ride-badge riding js-ride-badge')
        rideBadgeIcons.forEach(el => el.textContent = '🟢')
        rideBadgeTexts.forEach(el => el.textContent = '走行中')
        speedVals.forEach(el => el.classList.add('riding'))
        cardSpeeds.forEach(el => el.classList.add('active'))
      } else {
        rideBadges.forEach(el => el.className = 'ride-badge stopped js-ride-badge')
        rideBadgeIcons.forEach(el => el.textContent = '🔴')
        rideBadgeTexts.forEach(el => el.textContent = '停止中')
        speedVals.forEach(el => el.classList.remove('riding'))
        cardSpeeds.forEach(el => el.classList.remove('active'))
      }
    }

    function setOverlay(visible, icon = '', title = '', sub = '') {
      if (visible) {
        overlayIcon.textContent  = icon
        overlayTitle.textContent = title
        overlaySub.textContent   = sub
        overlay.classList.remove('hidden')
      } else {
        overlay.classList.add('hidden')
      }
    }

    function setConnState(connected, label = '') {
      btConnected = connected
      connLabel.textContent = label
      if (connected) {
        connDot.className = 'dot ok'
        disconnectBtns.forEach(el => el.disabled = false)
      } else {
        connDot.className = 'dot'
        disconnectBtns.forEach(el => el.disabled = true)
        isRiding     = false
        currentSpeed = null
        resetIris()
        speedVals.forEach(el => { el.textContent = '—'; el.classList.remove('riding') })
        cadenceVals.forEach(el => el.textContent = '—')
        powerVals.forEach(el => el.textContent = '—')
        cardSpeeds.forEach(el => el.classList.remove('active'))
        rideBadges.forEach(el => el.className = 'ride-badge disconnected js-ride-badge')
        rideBadgeIcons.forEach(el => el.textContent = '—')
        rideBadgeTexts.forEach(el => el.textContent = '未接続')
        tryPause()
      }
    }

    /* ── Bluetooth ── */
    async function connect(acceptAll, lastDeviceNamePrefix = null) {
      if (!navigator.bluetooth) {
        alert('このブラウザは Web Bluetooth に対応していません。\nChrome / Edge 系ブラウザでお試しください。')
        return
      }
      connDot.className     = 'dot warn'
      connLabel.textContent = '接続中...'

      try {
        let options
        if (lastDeviceNamePrefix) {
          // 前回デバイス：名前プレフィックスで絞り込んでダイアログを開く
          options = {
            filters: [{ namePrefix: lastDeviceNamePrefix }],
            optionalServices: Object.values(SVC),
          }
        } else if (acceptAll) {
          options = { acceptAllDevices: true, optionalServices: Object.values(SVC) }
        } else {
          options = {
            filters: [
              { namePrefix: 'QB' },
              { namePrefix: 'NEXGIM' },
              { namePrefix: 'C01' },
            ],
            optionalServices: Object.values(SVC),
          }
        }

        device = await navigator.bluetooth.requestDevice(options)
        device.addEventListener('gattserverdisconnected', onDisconnected)
        server = await device.gatt.connect()

        // 接続成功したらデバイス名を保存
        const devName = device.name || ''
        const prefix  = devName.slice(0, 3) || devName  // 先頭3文字をプレフィックスとして保存
        saveLastDevice(devName, prefix)
        updateLastDeviceBtn()

        setConnState(true, devName || 'バイク接続済み')
        setOverlay(true, '🚴', 'ペダルを漕いでください', `${thresholdKmh} km/h 以上で動画が再生されます`)
        rideBadges.forEach(el => el.className = 'ride-badge stopped js-ride-badge')
        rideBadgeIcons.forEach(el => el.textContent = '🔴')
        rideBadgeTexts.forEach(el => el.textContent = '停止中')

        await subscribeCharacteristics()
      } catch (err) {
        connDot.className     = 'dot err'
        connLabel.textContent = '接続失敗'
        console.error(err)
      }
    }

    function updateLastDeviceBtn() {
      const last = loadLastDevice()
      lastNames.forEach(el => el.textContent = last?.name || '前回のデバイス')
      connectLastBtns.forEach(el => el.style.display = last?.name ? 'flex' : 'none')
    }

    async function subscribeCharacteristics() {
      const targets = [
        { svc: SVC.fitnessMachine,      char: CHAR.indoorBikeData,          handler: parseIndoorBikeData },
        { svc: SVC.fitnessMachine,      char: CHAR.fitnessMachineStatus,    handler: null },
        { svc: SVC.cyclingPower,        char: CHAR.cyclingPowerMeasurement, handler: parseCyclingPower },
        { svc: SVC.cyclingSpeedCadence, char: CHAR.cscMeasurement,          handler: parseCscMeasurement },
      ]
      for (const t of targets) {
        try {
          const svc = await server.getPrimaryService(t.svc)
          const ch  = await svc.getCharacteristic(t.char)
          if ((ch.properties.notify || ch.properties.indicate) && t.handler) {
            await ch.startNotifications()
            ch.addEventListener('characteristicvaluechanged', e => t.handler(e.target.value))
          }
        } catch (_) {}
      }
    }

    /* ── Parsers ── */
    function parseIndoorBikeData(dv) {
      try {
        const flags = dv.getUint16(0, true)
        let off = 2
        const speedKmh = dv.getUint16(off, true) / 100; off += 2
        if (flags & (1 << 1)) off += 2
        let cad = null
        if (flags & (1 << 2)) { cad = dv.getUint16(off, true) / 2; off += 2 }
        if (flags & (1 << 3)) off += 2
        if (flags & (1 << 4)) off += 3
        if (flags & (1 << 5)) off += 2
        let pwr = null
        if (flags & (1 << 6)) pwr = dv.getInt16(off, true)

        currentSpeed = speedKmh
        speedVals.forEach(el => el.textContent = speedKmh.toFixed(1))
        if (cad !== null) cadenceVals.forEach(el => el.textContent = cad.toFixed(0))
        if (pwr !== null) powerVals.forEach(el => el.textContent = pwr)
        evaluateSpeed(speedKmh)
      } catch (_) {}
    }

    function parseCyclingPower(dv) {
      try { powerVals.forEach(el => el.textContent = dv.getInt16(2, true)) } catch (_) {}
    }

    function parseCscMeasurement(dv) {
      try {
        const flags = dv.getUint8(0)
        let off = 1
        if (flags & 0x01) off += 6
        if (flags & 0x02) {
          const revs = dv.getUint16(off, true); off += 2
          const time = dv.getUint16(off, true)
          if (lastCsc) {
            const revDiff  = (revs - lastCsc.revs) & 0xFFFF
            const timeDiff = (time - lastCsc.time) & 0xFFFF
            if (timeDiff > 0) cadenceVals.forEach(el => el.textContent = ((revDiff / (timeDiff / 1024)) * 60).toFixed(0))
          }
          lastCsc = { revs, time }
        }
      } catch (_) {}
    }

    /* ── Disconnect ── */
    async function disconnect() {
      try { if (device?.gatt?.connected) device.gatt.disconnect() } catch (_) {}
      onDisconnected()
    }

    function onDisconnected() {
      setConnState(false)
      setOverlay(true, '🚴', 'Bluetooth で接続してください', 'バイクの電源を入れて「バイク接続」ボタンを押してください')
      lastCsc = null
      server  = null
    }

    /* ── Wiring ── */
    $all('.js-connect-named').forEach(el => el.addEventListener('click', () => connect(false)))
    $all('.js-connect-any').forEach(el => el.addEventListener('click', () => connect(true)))
    $all('.js-disconnect').forEach(el => el.addEventListener('click', () => disconnect()))
    connectLastBtns.forEach(el => el.addEventListener('click', () => {
      const last = loadLastDevice()
      if (last?.namePrefix) connect(false, last.namePrefix)
    }))

    /* ── Init ── */
    setConnState(false)
    setOverlay(true, '🚴', 'Bluetooth で接続してください', 'バイクの電源を入れて「バイク接続」ボタンを押してください')
    updateLastDeviceBtn()
  </script>

</body>
</html>
